<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oscar Footer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #4F50FF; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif; }

  .oscar-footer {
    position: relative;
    background: #4F50FF;
    color: #fff;
    overflow: hidden;
    padding: 56px 56px 8px;
    min-height: 900px;
    display: flex;
    flex-direction: column;
  }

  .physics-layer {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: auto;
  }

  .ring-zone {
    flex: 1;
    min-height: 600px;
    position: relative;
    z-index: 0;
  }

  .footer-bottom {
    position: relative;
    z-index: 2;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.30);
    height: 8px;
    pointer-events: none;
  }

  @media (max-width: 900px) {
    .oscar-footer { padding: 32px 24px 20px; min-height: 600px; }
  }
</style>
</head>
<body>

<footer class="oscar-footer" id="footer">
  <canvas class="physics-layer" id="physics"></canvas>

  <div class="ring-zone" id="ringZone"></div>

  <div class="footer-bottom" id="footerBottom"></div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
(function () {
  const RING_COLORS = [
    "#1A1A4E",
    "#BCB8FF",
    "#E5E3FF",
    "#FFFFFF"
  ];

  const RING_PATH = "M56 0C23.808 0 0 26.1224 0 55.3082C0 82.3529 21.1126 112 56 112C91.1854 112 112 81.8918 112 55.7694C111.921 25.2 87.4437 0 56 0ZM56 93.5661C34.4371 93.5661 19.6887 74.9741 19.6887 55.9275C19.6887 37.1049 34.2914 18.4405 56 18.4405C77.7086 18.4405 92.3113 37.0259 92.3113 55.6969C92.2318 75.7449 76.7351 93.5661 56 93.5661Z";

  function buildSvgDataUrl(color) {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="112" height="112" viewBox="0 0 112 112"><path fill-rule="evenodd" clip-rule="evenodd" d="${RING_PATH}" fill="${color}"/></svg>`;
    return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
  }

  const { Engine, Render, Runner, Bodies, Body, Composite, Mouse, MouseConstraint, Events, Common } = Matter;

  const footer = document.getElementById("footer");
  const footerBottom = document.getElementById("footerBottom");
  const canvas = document.getElementById("physics");

  const loadedImages = {};
  let imagesLoaded = 0;

  function preload(callback) {
    RING_COLORS.forEach((c) => {
      const img = new Image();
      img.onload = () => {
        loadedImages[c] = img;
        imagesLoaded++;
        if (imagesLoaded === RING_COLORS.length) callback();
      };
      img.src = buildSvgDataUrl(c);
    });
  }

  preload(init);

  function init() {
    const engine = Engine.create();
    engine.gravity.y = 1;
    const world = engine.world;

    let width = footer.clientWidth;
    let height = footer.clientHeight;

    const render = Render.create({
      canvas: canvas,
      engine: engine,
      options: {
        width,
        height,
        wireframes: false,
        background: "transparent",
        pixelRatio: window.devicePixelRatio || 1
      }
    });
    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

    function getGroundY() {
      const footerRect = footer.getBoundingClientRect();
      const bottomRect = footerBottom.getBoundingClientRect();
      return bottomRect.top - footerRect.top;
    }

    const wallOpts = { isStatic: true, render: { visible: false } };
    let groundY = getGroundY();
    let ground = Bodies.rectangle(width / 2, groundY + 30, width * 2, 60, wallOpts);
    let leftWall = Bodies.rectangle(-30, height / 2, 60, height * 2, wallOpts);
    let rightWall = Bodies.rectangle(width + 30, height / 2, 60, height * 2, wallOpts);
    let ceiling = Bodies.rectangle(width / 2, -200, width * 2, 60, wallOpts);
    Composite.add(world, [ground, leftWall, rightWall, ceiling]);

    const rings = [];

    const RING_RADIUS = 46;

    function makeRing(x, y, color) {
      const body = Bodies.circle(x, y, RING_RADIUS, {
        restitution: 0.5,
        friction: 0.05,
        frictionAir: 0.005,
        density: 0.0012,
        render: { visible: false }
      });
      rings.push({ body, color });
      Composite.add(world, body);
      return body;
    }

    Events.on(render, "afterRender", function () {
      const ctx = render.context;
      for (const r of rings) {
        const { x, y } = r.body.position;
        const a = r.body.angle;
        const img = loadedImages[r.color];
        if (!img) continue;
        const size = RING_RADIUS * 2;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(a);
        ctx.drawImage(img, -size / 2, -size / 2, size, size);
        ctx.restore();
      }
    });

    const mouse = Mouse.create(render.canvas);
    mouse.pixelRatio = window.devicePixelRatio || 1;
    const mouseConstraint = MouseConstraint.create(engine, {
      mouse: mouse,
      constraint: { stiffness: 0.5, damping: 0.05, render: { visible: false } }
    });
    Composite.add(world, mouseConstraint);
    render.mouse = mouse;

    let mouseX = -9999, mouseY = -9999;
    let prevMouseX = -9999, prevMouseY = -9999;
    let mouseVX = 0, mouseVY = 0;

    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      prevMouseX = mouseX;
      prevMouseY = mouseY;
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
      if (prevMouseX > -9000) {
        mouseVX = mouseX - prevMouseX;
        mouseVY = mouseY - prevMouseY;
      }
    });
    canvas.addEventListener("mouseleave", () => {
      mouseX = -9999; mouseY = -9999;
      mouseVX = 0; mouseVY = 0;
    });

    Events.on(engine, "beforeUpdate", () => {
      if (mouseX < -9000) return;
      const pushRadius = 180;
      for (const r of rings) {
        const dx = r.body.position.x - mouseX;
        const dy = r.body.position.y - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < pushRadius && dist > 0.1) {
          const falloff = 1 - dist / pushRadius;
          // Stronger base push
          const force = 0.0045 * falloff * r.body.mass;
          Body.applyForce(r.body, r.body.position, {
            x: (dx / dist) * force,
            y: (dy / dist) * force
          });
          // Much stronger swipe force in direction of mouse motion
          const swipe = 0.0015 * falloff * r.body.mass;
          Body.applyForce(r.body, r.body.position, {
            x: mouseVX * swipe,
            y: mouseVY * swipe
          });
        }
      }
      mouseVX *= 0.88;
      mouseVY *= 0.88;
    });

    function dropAllRings() {
      const ringDiameter = RING_RADIUS * 2;
      const usableWidth = width - 40;
      // How many rings fit horizontally if packed tightly
      const ringsPerRow = Math.floor(usableWidth / (ringDiameter * 0.95));
      // Stack 4 rows for a deep pile
      const rows = 4;
      const count = ringsPerRow * rows;

      const positions = [];
      for (let row = 0; row < rows; row++) {
        for (let i = 0; i < ringsPerRow; i++) {
          // Offset alternate rows slightly so they don't perfectly stack
          const rowOffset = (row % 2) * (ringDiameter * 0.4);
          const x = 20 + ringDiameter / 2 + i * ringDiameter * 0.95 + rowOffset + (Math.random() - 0.5) * 20;
          // Stagger vertically with each row higher up
          const y = -RING_RADIUS - row * (ringDiameter * 1.2) - Math.random() * 80;
          positions.push({ x, y });
        }
      }

      const colorPool = [];
      for (let i = 0; i < count; i++) {
        colorPool.push(RING_COLORS[i % RING_COLORS.length]);
      }
      for (let i = colorPool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [colorPool[i], colorPool[j]] = [colorPool[j], colorPool[i]];
      }

      positions.forEach((pos, i) => {
        makeRing(pos.x, pos.y, colorPool[i]);
      });
    }

    let started = false;
    function start() {
      if (started) return;
      started = true;
      dropAllRings();
    }

    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) start(); });
    }, { threshold: 0.1 });
    io.observe(footer);
    setTimeout(start, 800);

    function resize() {
      width = footer.clientWidth;
      height = footer.clientHeight;
      groundY = getGroundY();

      render.canvas.width = width * (window.devicePixelRatio || 1);
      render.canvas.height = height * (window.devicePixelRatio || 1);
      render.canvas.style.width = width + "px";
      render.canvas.style.height = height + "px";
      render.options.width = width;
      render.options.height = height;
      Render.setPixelRatio(render, window.devicePixelRatio || 1);

      Body.setPosition(ground, { x: width / 2, y: groundY + 30 });
      Body.setPosition(leftWall, { x: -30, y: height / 2 });
      Body.setPosition(rightWall, { x: width + 30, y: height / 2 });
      Body.setPosition(ceiling, { x: width / 2, y: -200 });
    }
    window.addEventListener("resize", resize);
    requestAnimationFrame(resize);
  }
})();
</script>

</body>
</html>
